<mat-toolbar color="primary">
  <mat-toolbar-row>
    <a href="/products" mat-button>Products</a>
    <a href="/cart" mat-button>
      Cart
      <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
    </a>

    <span class="spacer"></span>

    <!-- Show when NOT logged in -->
    <ng-container *ngIf="!isLoggedIn">
      <a href="/login" mat-button>Login</a>
      <a href="/signup" mat-button>Sign Up</a>
      <button class="admin-btn" mat-button (click)="onAdminLogin()">
        Admin Login
      </button>
    </ng-container>

    <!-- Show when logged in -->
    <ng-container *ngIf="isLoggedIn">
      <span class="role-badge" [ngClass]="currentUserRole">
        {{ currentUserRole === 'store_owner' ? 'Store Owner' : currentUserRole === 'admin' ? 'Admin' : 'Customer' }}
      </span>
      <span class="welcome-text">Hi, {{ currentUserName }}</span>
      <button mat-button (click)="onLogout()">Logout</button>
    </ng-container>
  </mat-toolbar-row>
</mat-toolbar>

<div class="container text-center">
  <h1>LAZSHOPEE</h1>
  <h2>SHOP NOW!</h2>
</div>

<app-toast></app-toast>

<router-outlet></router-outlet>
