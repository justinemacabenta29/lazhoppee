<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Create Account</h2>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder=>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder=>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder=>
    </div>

    <div class="form-group">
      <label>I am a:</label>
      <select [(ngModel)]="role">
        <option value="customer">Customer</option>
        <option value="store_owner">Store Owner</option>
      </select>
    </div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <p class="success" *ngIf="successMsg">{{ successMsg }}</p>

    <button mat-raised-button color="accent" (click)="onSignup()">Sign Up</button>

    <p class="switch-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
