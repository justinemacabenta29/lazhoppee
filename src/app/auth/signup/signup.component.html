<div class="auth-wrapper">
  <div class="auth-card">

    <div class="brand">
      <h1>LAZSHOPEE</h1>
      <p>Create your account</p>
    </div>

    <!-- Role selector tabs -->
    <div class="role-tabs">
      <button [class.active]="role === 'customer'"
              (click)="role = 'customer'">
        Customer
      </button>
      <button [class.active]="role === 'store_owner'"
              (click)="role = 'store_owner'">
        Store Owner
      </button>
      <button [class.active]="role === 'admin'"
              (click)="role = 'admin'">
        Admin
      </button>
      <button [class.active]="role === 'courier'"
              (click)="role = 'courier'">
        Courier
      </button>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Full Name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Password">
    </div>

    <!-- Store owner notice -->
    <div class="notice" *ngIf="role === 'store_owner'">
      <span>⚠️</span> Store owner accounts require admin approval before you can start selling.
    </div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <p class="success" *ngIf="successMsg">{{ successMsg }}</p>

    <button mat-raised-button (click)="onSignup()">
      Sign Up as {{ role === 'store_owner' ? 'Store Owner' : role === 'admin' ? 'Admin' : role === 'courier' ? 'Courier' : 'Customer' }}
    </button>

    <p class="switch-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
