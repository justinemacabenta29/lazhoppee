<div class="auth-wrapper">
  <div class="auth-card">

    <div class="brand">
      <h1>LAZSHOPEE</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Role selector tabs -->
    <div class="role-tabs">
      <button [class.active]="selectedRole === 'customer'"
              (click)="selectedRole = 'customer'">
        Customer
      </button>
      <button [class.active]="selectedRole === 'store_owner'"
              (click)="selectedRole = 'store_owner'">
        Store Owner
      </button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Password">
    </div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button mat-raised-button (click)="onLogin()">
      Login as {{ selectedRole === 'store_owner' ? 'Store Owner' : selectedRole === 'admin' ? 'Admin' : 'Customer' }}
    </button>

    <p class="switch-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>
