<div class="admin-login-page">

  <!-- Header -->
  <div class="brand-banner">
    <h1>LAZSHOPEE</h1>
    <p>ADMIN PORTAL</p>
  </div>

  <!-- Login Card -->
  <div class="auth-wrapper">

    <div class="auth-card">

      <div class="brand">
        <h2>LAZSHOPEE</h2>
        <p>Sign in as Admin</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Enter your password">
      </div>

      <p class="error" *ngIf="errorMsg">
        {{ errorMsg }}
      </p>

      <button
        mat-raised-button
        class="login-btn"
        (click)="onLogin()">
        Login as Admin
      </button>

      <button
        class="back-btn"
        (click)="goBack()">
        ← Back
      </button>

    </div>

  </div>

</div>
