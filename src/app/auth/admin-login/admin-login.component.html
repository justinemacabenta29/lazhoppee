<div class="shopee-layout">

  <div class="auth-split">

    <div class="promo-panel admin-promo">
      <div class="promo-content">
        <div class="promo-logo">LAZSHOPEE</div>
        <h1 class="promo-title">Admin<br>Portal.</h1>
        <p class="promo-sub">Manage stores, users, and platform operations.</p>
        <div class="promo-shapes">
          <span class="shape shape-1"></span>
          <span class="shape shape-2"></span>
          <span class="shape shape-3"></span>
        </div>
      </div>
    </div>

    <div class="auth-card-panel">
      <div class="auth-card">

        <button class="back-btn" (click)="goBack()">← Back</button>

        <h2 class="card-title">Admin Sign In</h2>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" placeholder="Admin email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" placeholder="Password">
        </div>

        <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <button class="login-btn" (click)="onLogin()">
          Login as Admin
        </button>

      </div>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-col">
      <h4>Customer Service</h4>
      <a href="#">Help Centre</a>
      <a href="#">Contact Us</a>
      <a href="#">Free Shipping</a>
      <a href="#">Order Tracking</a>
      <a href="#">Return and Refund</a>
    </div>
    <div class="footer-col">
      <h4>About Lazshopee</h4>
      <a href="#">About Us</a>
      <a href="#">Policies</a>
      <a href="#">Flash Deals</a>
      <a href="#">Seller Centre</a>
    </div>
    <div class="footer-col">
      <h4>Follow Us</h4>
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      
    </div>
  </footer>

</div>
